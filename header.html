  shadow.appendChild(style);
  shadow.appendChild(tpl.content.cloneNode(true));

  /* ── Original JS verbatim, all querySelector calls scoped to shadow ── */
  const wrapper      = shadow.querySelector('.hyperion-header-wrapper');
  const desktopMenu  = shadow.getElementById('hyperion-desktopMegaMenu');
  const triggers     = shadow.querySelectorAll('[data-hyperion-megamenu-trigger]');
  const mobileToggle = shadow.getElementById('hyperion-mobileMenuToggle');
  const mobileItems  = shadow.querySelectorAll('.hyperion-custom-nav-item--has-megamenu');
  const body         = document.body;

  triggers.forEach(trigger => {
      const panelId     = trigger.getAttribute('data-hyperion-megamenu-trigger');
      const sourcePanel = trigger.closest('li')
          .querySelector('[data-hyperion-megamenu-panel="' + panelId + '"]');
      if (!sourcePanel) return;
      const clone = sourcePanel.cloneNode(true);
      clone.classList.add('hyperion-desktop-clone');
      desktopMenu.appendChild(clone);
  });

  const desktopPanels = desktopMenu.querySelectorAll('.hyperion-mega-menu-panel');
  let closeTimer = null;

  function openDesktopMenu(panelId) {
      clearTimeout(closeTimer);
      desktopPanels.forEach(p => p.classList.remove('active'));
      triggers.forEach(t => t.classList.remove('active'));
      const panel = desktopMenu.querySelector('[data-hyperion-megamenu-panel="' + panelId + '"]');
      const trig  = shadow.querySelector('[data-hyperion-megamenu-trigger="' + panelId + '"]');
      if (panel) panel.classList.add('active');
      if (trig)  trig.classList.add('active');
      wrapper.classList.add('hyperion-mega-menu-open');
  }

  function closeDesktopMenu() {
      closeTimer = setTimeout(() => {
          desktopPanels.forEach(p => p.classList.remove('active'));
          triggers.forEach(t => t.classList.remove('active'));
          wrapper.classList.remove('hyperion-mega-menu-open');
      }, 150);
  }

  triggers.forEach(trigger => {
      trigger.addEventListener('mouseenter', () => {
          if (window.innerWidth > 1024) openDesktopMenu(trigger.getAttribute('data-hyperion-megamenu-trigger'));
      });
      trigger.closest('li').addEventListener('mouseleave', () => {
          if (window.innerWidth > 1024) closeDesktopMenu();
      });
  });

  desktopMenu.addEventListener('mouseenter', () => { if (window.innerWidth > 1024) clearTimeout(closeTimer); });
  desktopMenu.addEventListener('mouseleave', () => { if (window.innerWidth > 1024) closeDesktopMenu(); });

  mobileToggle.addEventListener('click', () => {
      wrapper.classList.toggle('hyperion-mobile-menu-open');
      body.classList.toggle('hyperion-mobile-menu-active');
      if (!wrapper.classList.contains('hyperion-mobile-menu-open')) {
          mobileItems.forEach(item => item.classList.remove('active'));
          wrapper.classList.remove('hyperion-mega-menu-open');
      }
  });

  mobileItems.forEach(item => {
      const trigger = item.querySelector('.hyperion-custom-nav-link');
      trigger.addEventListener('click', e => {
          if (window.innerWidth <= 1024) {
              e.preventDefault(); e.stopPropagation();
              const isOpen = item.classList.contains('active');
              mobileItems.forEach(other => other.classList.remove('active'));
              if (!isOpen) item.classList.add('active');
          }
      });
  });

  shadow.querySelectorAll('.hyperion-mega-menu-group-list a, .hyperion-custom-nav-list > li > a:not([data-hyperion-megamenu-trigger])').forEach(link => {
      link.addEventListener('click', () => {
          if (window.innerWidth <= 1024) {
              wrapper.classList.remove('hyperion-mobile-menu-open');
              body.classList.remove('hyperion-mobile-menu-active');
              mobileItems.forEach(item => item.classList.remove('active'));
          }
      });
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
          if (window.innerWidth > 1024) {
              wrapper.classList.remove('hyperion-mobile-menu-open');
              body.classList.remove('hyperion-mobile-menu-active');
              mobileItems.forEach(item => item.classList.remove('active'));
          } else {
              desktopPanels.forEach(p => p.classList.remove('active'));
              wrapper.classList.remove('hyperion-mega-menu-open');
          }
      }, 200);
  });

})();
</script>
