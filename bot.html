<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maluti AI Chat Widget - Functional</title>
<style>
  /* 
   * NAMESPACED COMPONENT: .hmw- (Hyperion Maluti Widget)
   * Strictly encapsulated to prevent CSS conflicts.
   */

  @font-face {
    font-family: 'Circular Std';
    src: local('Circular Std Book'), local('CircularStd-Book');
  }

  .hmw-wrapper {
    font-family: 'Circular Std', -apple-system, BlinkMacSystemFont, sans-serif;
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    z-index: 99999;
  }

  .hmw-wrapper * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* Main Chat Window & Animations */
  .hmw-chat-modal {
    width: 380px;
    height: 600px;
    max-height: calc(100vh - 100px);
    background: #FFFFFF;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15), 0 2px 8px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid #E5E7EB;
    
    /* Animation defaults */
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    transform-origin: bottom right;
    position: absolute;
    bottom: 80px;
    right: 0;
  }

  .hmw-chat-modal.hmw-is-open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* Gradient Header Section */
  .hmw-header {
    background: linear-gradient(135deg, #7C66FF 0%, #4D8AF0 100%);
    padding: 24px 24px 20px;
    position: relative;
    color: #FFFFFF;
    flex-shrink: 0;
    transition: padding 0.3s ease;
  }

  .hmw-header.hmw-compact {
    padding: 16px 24px;
  }

  .hmw-minimize-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }

  .hmw-minimize-btn:hover {
    opacity: 0.7;
  }

  .hmw-brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .hmw-header.hmw-compact .hmw-brand-row {
    margin-bottom: 0;
  }

  .hmw-brand-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .hmw-badge {
    background: #FFFFFF;
    color: #333;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  .hmw-header-desc {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 20px;
    opacity: 0.95;
    transition: all 0.3s ease;
  }

  /* Search Input Module (Initial View) */
  .hmw-search-container {
    background: #FFFFFF;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 6px 6px 6px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
  }

  .hmw-search-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: #1A1A1A;
    background: transparent;
  }

  .hmw-search-submit {
    background: #B4B9C2;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .hmw-search-submit:hover {
    background: #7C66FF;
  }

  /* Body Sections */
  .hmw-body-container {
    flex: 1;
    background: #FFFFFF;
    position: relative;
    overflow: hidden;
  }

  .hmw-view {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
  }

  /* Welcome View */
  .hmw-welcome-view {
    padding: 24px;
    overflow-y: auto;
  }

  .hmw-welcome-view.hmw-hidden {
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }

  .hmw-body-title {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
  }

  .hmw-body-subtitle {
    font-size: 14px;
    color: #6B7280;
    margin-bottom: 20px;
  }

  .hmw-options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .hmw-option-btn {
    text-align: left;
    padding: 12px 16px;
    border-radius: 8px;
    background: linear-gradient(90deg, #F0F7FF 0%, #F9F3FF 100%);
    border: 1px solid #D9CFFF;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: #111827;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .hmw-option-btn:hover {
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    transform: translateY(-1px);
    border-color: #7C66FF;
  }

  /* Chat View */
  .hmw-chat-view {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  .hmw-chat-view.hmw-active {
    transform: translateX(0);
    opacity: 1;
    pointer-events: all;
  }

  .hmw-chat-history {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .hmw-message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    animation: hmw-fade-up 0.3s ease forwards;
  }

  @keyframes hmw-fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hmw-msg-user {
    align-self: flex-end;
    background: #F3F4F6;
    color: #111827;
    border-bottom-right-radius: 4px;
  }

  .hmw-msg-bot {
    align-self: flex-start;
    background: linear-gradient(135deg, #7C66FF 0%, #4D8AF0 100%);
    color: #FFFFFF;
    border-bottom-left-radius: 4px;
  }

  /* Chat Input Area */
  .hmw-chat-input-area {
    padding: 16px;
    border-top: 1px solid #E5E7EB;
    background: #FFFFFF;
    display: flex;
    gap: 12px;
  }

  .hmw-chat-input-field {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid #E5E7EB;
    border-radius: 20px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .hmw-chat-input-field:focus {
    border-color: #7C66FF;
  }

  .hmw-chat-send-btn {
    background: #7C66FF;
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .hmw-chat-send-btn:hover {
    background: #4D8AF0;
  }

  /* Footer Section */
  .hmw-footer {
    padding: 8px 24px 24px;
    text-align: center;
    background: #FFFFFF;
    transition: opacity 0.3s;
  }

  .hmw-footer-text {
    font-size: 12px;
    color: #6B7280;
  }

  .hmw-footer-link {
    color: #2563EB;
    text-decoration: none;
  }

  /* Floating Action Button */
  .hmw-fab {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #7C66FF 0%, #4D8AF0 100%);
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(77, 138, 240, 0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .hmw-fab:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 16px rgba(77, 138, 240, 0.4);
  }

  .hmw-fab.hmw-is-hidden {
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
  }

  /* Typing Indicator */
  .hmw-typing {
    display: flex;
    gap: 4px;
    padding: 16px;
    background: #F3F4F6;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    width: fit-content;
  }

  .hmw-dot {
    width: 6px;
    height: 6px;
    background: #9CA3AF;
    border-radius: 50%;
    animation: hmw-bounce 1.4s infinite ease-in-out both;
  }

  .hmw-dot:nth-child(1) { animation-delay: -0.32s; }
  .hmw-dot:nth-child(2) { animation-delay: -0.16s; }

  @keyframes hmw-bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="hmw-wrapper">
  
  <!-- Main Modal Window -->
  <div class="hmw-chat-modal" id="hmwModal">
    <div class="hmw-header" id="hmwHeader">
      <button class="hmw-minimize-btn" id="hmwMinimizeBtn" aria-label="Minimize">
        <svg width="12" height="2" viewBox="0 0 12 2" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1H11" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      
      <div class="hmw-brand-row">
        <h2 class="hmw-brand-title">Ask Maluti</h2>
        <span class="hmw-badge">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
             <polyline points="2 17 12 22 22 17"></polyline>
             <polyline points="2 12 12 17 22 12"></polyline>
           </svg>
           built-in
        </span>
      </div>

      <p class="hmw-header-desc" id="hmwHeaderDesc">
        Get helpful guidance and recommendations from Maluti TVET College's AI assistant.
      </p>

      <div class="hmw-search-container" id="hmwSearchContainer">
        <input type="text" class="hmw-search-input" id="hmwTopInput" placeholder="Ask a question">
        <button class="hmw-search-submit" id="hmwTopSubmit" aria-label="Submit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="hmw-body-container">
      
      <!-- View 1: Welcome Menu -->
      <div class="hmw-view hmw-welcome-view" id="hmwWelcomeView">
        <h3 class="hmw-body-title">Want help getting started?</h3>
        <p class="hmw-body-subtitle">Tell us a little bit about what you're looking for.</p>

        <div class="hmw-options-list">
          <button class="hmw-option-btn" data-query="I want to learn about campus locations and courses">
            I want to learn about campus locations and courses
          </button>
          <button class="hmw-option-btn" data-query="I need placement test or application support">
            I need placement test or application support
          </button>
          <button class="hmw-option-btn" data-query="I have an NSFAS funding or registration issue">
            I have an NSFAS funding or registration issue
          </button>
        </div>
      </div>

      <!-- View 2: Active Chat Interface -->
      <div class="hmw-view hmw-chat-view" id="hmwChatView">
        <div class="hmw-chat-history" id="hmwChatHistory">
          <!-- Messages inject here -->
        </div>
        <div class="hmw-chat-input-area">
          <input type="text" class="hmw-chat-input-field" id="hmwBottomInput" placeholder="Type your message...">
          <button class="hmw-chat-send-btn" id="hmwBottomSubmit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

    </div>

    <div class="hmw-footer" id="hmwFooter">
      <p class="hmw-footer-text">By chatting, you agree to this <a href="#" class="hmw-footer-link">disclaimer</a>.</p>
    </div>
  </div>

  <!-- Trigger Button -->
  <button class="hmw-fab" id="hmwFab" aria-label="Open Chat">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 11.5C21 16.1944 16.9706 20 12 20C10.6128 20 9.2995 19.6896 8.14088 19.1415L3.5 20.5L4.8585 15.8591C4.31043 14.7005 4 13.3872 4 12C4 7.30558 8.02944 3.5 13 3.5C17.9706 3.5 22 7.30558 22 12V11.5Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  
</div>

<script>
/**
 * Hyperion Maluti Widget Logic
 * Encapsulated in an IIFE to prevent global scope pollution.
 */
(() => {
  // DOM Elements
  const fab = document.getElementById('hmwFab');
  const modal = document.getElementById('hmwModal');
  const minimizeBtn = document.getElementById('hmwMinimizeBtn');
  
  const header = document.getElementById('hmwHeader');
  const headerDesc = document.getElementById('hmwHeaderDesc');
  const searchContainer = document.getElementById('hmwSearchContainer');
  const footer = document.getElementById('hmwFooter');
  
  const welcomeView = document.getElementById('hmwWelcomeView');
  const chatView = document.getElementById('hmwChatView');
  const chatHistory = document.getElementById('hmwChatHistory');
  
  const topInput = document.getElementById('hmwTopInput');
  const topSubmit = document.getElementById('hmwTopSubmit');
  const bottomInput = document.getElementById('hmwBottomInput');
  const bottomSubmit = document.getElementById('hmwBottomSubmit');
  const optionBtns = document.querySelectorAll('.hmw-option-btn');

  let isChatActive = false;

  // --- UI Toggle Functions ---

  function openWidget() {
    modal.classList.add('hmw-is-open');
    fab.classList.add('hmw-is-hidden');
  }

  function closeWidget() {
    modal.classList.remove('hmw-is-open');
    fab.classList.remove('hmw-is-hidden');
  }

  function transitionToChat(initialQuery) {
    if (isChatActive) return;
    isChatActive = true;

    // UI transitions
    headerDesc.style.display = 'none';
    searchContainer.style.display = 'none';
    header.classList.add('hmw-compact');
    footer.style.display = 'none';
    
    welcomeView.classList.add('hmw-hidden');
    chatView.classList.add('hmw-active');

    // Handle initial message
    if (initialQuery) {
      appendMessage(initialQuery, 'user');
      simulateBotResponse(initialQuery);
    }
  }

  // --- Chat Logic Functions ---

  function appendMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('hmw-message');
    msgDiv.classList.add(sender === 'user' ? 'hmw-msg-user' : 'hmw-msg-bot');
    msgDiv.textContent = text;
    chatHistory.appendChild(msgDiv);
    scrollToBottom();
  }

  function showTypingIndicator() {
    const typingDiv = document.createElement('div');
    typingDiv.classList.add('hmw-typing');
    typingDiv.id = 'hmwTypingIndicator';
    typingDiv.innerHTML = `
      <div class="hmw-dot"></div>
      <div class="hmw-dot"></div>
      <div class="hmw-dot"></div>
    `;
    chatHistory.appendChild(typingDiv);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const indicator = document.getElementById('hmwTypingIndicator');
    if (indicator) indicator.remove();
  }

  function simulateBotResponse(query) {
    showTypingIndicator();
    
    // Simple simulated response logic based on Maluti TVET context
    setTimeout(() => {
      removeTypingIndicator();
      let response = "I'm a virtual assistant for Maluti TVET College. I can help you with applications, NSFAS, and campus details. Could you provide a bit more specific detail?";
      
      const q = query.toLowerCase();
      if (q.includes('campus') || q.includes('course')) {
        response = "Maluti TVET College has several campuses including Bethlehem, Bonamelo, Harrismith, Itemoheleng, Kwetlisong, Lere la Tshepe, and Sefikeng. We offer NATED and NC(V) courses in Business and Engineering studies.";
      } else if (q.includes('placement') || q.includes('application')) {
        response = "To apply, you first need to complete the compulsory Placement Test. Once done, you can submit your application online through our portal with your certified ID and results.";
      } else if (q.includes('nsfas') || q.includes('funding')) {
        response = "If you need funding, ensure you apply directly through the NSFAS portal. Our Student Support Services on your respective campus can assist with registration clearance once funded.";
      }

      appendMessage(response, 'bot');
    }, 1500);
  }

  function scrollToBottom() {
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function handleTopSubmit() {
    const query = topInput.value.trim();
    if (query) {
      topInput.value = '';
      transitionToChat(query);
    }
  }

  function handleBottomSubmit() {
    const query = bottomInput.value.trim();
    if (query) {
      bottomInput.value = '';
      appendMessage(query, 'user');
      simulateBotResponse(query);
    }
  }

  // --- Event Listeners ---

  fab.addEventListener('click', openWidget);
  minimizeBtn.addEventListener('click', closeWidget);

  // Top Input (Welcome View)
  topSubmit.addEventListener('click', handleTopSubmit);
  topInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleTopSubmit();
  });

  // Bottom Input (Active Chat View)
  bottomSubmit.addEventListener('click', handleBottomSubmit);
  bottomInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleBottomSubmit();
  });

  // Option Buttons
  optionBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const query = e.target.getAttribute('data-query') || e.target.textContent;
      transitionToChat(query.trim());
    });
  });

})();
</script>

</body>
</html>
