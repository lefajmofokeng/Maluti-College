  shadow.appendChild(style);
  shadow.appendChild(tpl.content.cloneNode(true));

  const wrapper      = shadow.querySelector('.hyperion-header-wrapper');
  const desktopMenu  = shadow.getElementById('hyperion-desktopMegaMenu');
  const triggers     = shadow.querySelectorAll('[data-hyperion-megamenu-trigger]');
  const mobileToggle = shadow.getElementById('hyperion-mobileMenuToggle');
  const mobileItems  = shadow.querySelectorAll('.hyperion-custom-nav-item--has-megamenu');
  const body         = document.body;

  triggers.forEach(trigger => {
      const panelId     = trigger.getAttribute('data-hyperion-megamenu-trigger');
      const sourcePanel = trigger.closest('li')
          .querySelector('[data-hyperion-megamenu-panel="' + panelId + '"]');
      if (!sourcePanel) return;
      const clone = sourcePanel.cloneNode(true);
      clone.classList.add('hyperion-desktop-clone');
      desktopMenu.appendChild(clone);
  });

  const desktopPanels = desktopMenu.querySelectorAll('.hyperion-mega-menu-panel');
  let closeTimer = null;

  function openDesktopMenu(panelId) {
      clearTimeout(closeTimer);
      desktopPanels.forEach(p => p.classList.remove('active'));
      triggers.forEach(t => t.classList.remove('active'));
      const panel = desktopMenu.querySelector('[data-hyperion-megamenu-panel="' + panelId + '"]');
      const trig  = shadow.querySelector('[data-hyperion-megamenu-trigger="' + panelId + '"]');
      if (panel) panel.classList.add('active');
      if (trig)  trig.classList.add('active');
      wrapper.classList.add('hyperion-mega-menu-open');
  }

  function closeDesktopMenu() {
      closeTimer = setTimeout(() => {
          desktopPanels.forEach(p => p.classList.remove('active'));
          triggers.forEach(t => t.classList.remove('active'));
          wrapper.classList.remove('hyperion-mega-menu-open');
      }, 150);
  }

  triggers.forEach(trigger => {
      trigger.addEventListener('mouseenter', () => {
          if (window.innerWidth > 1024) openDesktopMenu(trigger.getAttribute('data-hyperion-megamenu-trigger'));
      });
      trigger.closest('li').addEventListener('mouseleave', () => {
          if (window.innerWidth > 1024) closeDesktopMenu();
      });
  });

  desktopMenu.addEventListener('mouseenter', () => { if (window.innerWidth > 1024) clearTimeout(closeTimer); });
  desktopMenu.addEventListener('mouseleave', () => { if (window.innerWidth > 1024) closeDesktopMenu(); });

  mobileToggle.addEventListener('click', () => {
      wrapper.classList.toggle('hyperion-mobile-menu-open');
      body.classList.toggle('hyperion-mobile-menu-active');
      if (!wrapper.classList.contains('hyperion-mobile-menu-open')) {
          mobileItems.forEach(item => item.classList.remove('active'));
          wrapper.classList.remove('hyperion-mega-menu-open');
      }
  });

  mobileItems.forEach(item => {
      const trigger = item.querySelector('.hyperion-custom-nav-link');
      trigger.addEventListener('click', e => {
          if (window.innerWidth <= 1024) {
              e.preventDefault(); e.stopPropagation();
              const isOpen = item.classList.contains('active');
              mobileItems.forEach(other => other.classList.remove('active'));
              if (!isOpen) item.classList.add('active');
          }
      });
  });

  shadow.querySelectorAll('.hyperion-mega-menu-group-list a, .hyperion-custom-nav-list > li > a:not([data-hyperion-megamenu-trigger])').forEach(link => {
      link.addEventListener('click', () => {
          if (window.innerWidth <= 1024) {
              wrapper.classList.remove('hyperion-mobile-menu-open');
              body.classList.remove('hyperion-mobile-menu-active');
              mobileItems.forEach(item => item.classList.remove('active'));
          }
      });
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
          if (window.innerWidth > 1024) {
              wrapper.classList.remove('hyperion-mobile-menu-open');
              body.classList.remove('hyperion-mobile-menu-active');
              mobileItems.forEach(item => item.classList.remove('active'));
          } else {
              desktopPanels.forEach(p => p.classList.remove('active'));
              wrapper.classList.remove('hyperion-mega-menu-open');
          }
      }, 200);
  });

})();
</script>
</body>

            </div>
            <button class="sw-modal-close" id="sw-modal-close">&#x2715;</button>
        </div>
        <iframe id="sw-map-iframe" class="sw-modal-map" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</div>

<script>

    const swProperties = [
        {

            images: [

                'https://images.pexels.com/photos/2506990/pexels-photo-2506990.jpeg'
            ],
            location: {

                description: 'Situated in the heart of Kestell town, within walking distance of local shops, a taxi rank, and essential amenities. The neighbourhood is quiet and well-suited for students seeking a focused study environment.',
                campus: 'Maluti TVET College — Kestell Campus',
                distance: 'Approximately 1.4 km — roughly a 17-minute walk or a short taxi ride.',

            ],
            pricing: {
                monthly: 'R1 800 per month',
                deposit: 'R900 (50% of monthly rent — refundable)',
                includes: 'Water and refuse removal included in the monthly rent.',
                electricity: 'Electricity is prepaid and managed separately by the tenant.',
                paymentTerms: 'Monthly rent is due on or before the 1st of each month. The deposit is collected upon signing the rental agreement and is fully refundable at the end of the tenancy, subject to a satisfactory exit inspection.'
            },
            contact: {
                name: 'Mrs Ntombifikile Dlamini',
                role: 'Property Owner',
                phone: '+27 72 341 0082',
                note: 'Available on weekdays between 08:00 and 17:00. Please call or send a WhatsApp message to arrange a viewing. Walk-in visits are welcome, however an appointment is preferred to ensure the owner is on site.'
            }
        },
        {
            id: 'prop2',
            title: '2. Phuthaditjhaba Shared Residence',
            status: '1 Spot Available',
            images: [
                'https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg',
                'https://images.pexels.com/photos/1648776/pexels-photo-1648776.jpeg',
                'https://images.pexels.com/photos/259962/pexels-photo-259962.jpeg'
            ],
            location: {
                address: '7 Ntlo Khono Drive, Phuthaditjhaba, Free State, 9869',
                description: 'Located in a well-established residential area of Phuthaditjhaba, with easy access to public transport routes heading toward the college. Local spaza shops, a clinic, and a supermarket are all within a 10-minute walk.',
                campus: 'Maluti TVET College — Phuthaditjhaba Campus',
                distance: 'Approximately 2.1 km — about a 25-minute walk or a short taxi/bus ride via the main road.',
                mapSrc: 'https://www.google.com/maps?q=Phuthaditjhaba,+Free+State,+South+Africa&output=embed'
            },
            features: [
                'Single and double room options available — specify your preference when enquiring',
                'Outdoor toilet and bathroom facilities — well maintained and cleaned daily',
                'Borehole water supply — uninterrupted even during municipal outages',
                '24-hour manned security gate with visitor sign-in register',
                'Wi-Fi infrastructure in place — tenants arrange their own SIM card data',
                'Shared fully equipped kitchen with gas stove and fridge',
                'Communal living area with seating',
                'Wheelie bins provided — no littering or dumping permitted on the property'
            ],
            pricing: {
                monthly: 'R1 500 per month',
                deposit: 'R750 (50% of monthly rent — refundable)',
                includes: 'Water (borehole supply) is included in the monthly rent.',
                electricity: 'Electricity is via prepaid meter — tenant purchases and loads their own units.',
                paymentTerms: 'Rent is payable monthly in advance. The deposit is due upon signing the rental agreement and is fully refundable at the end of the lease, subject to a satisfactory exit inspection by the owner.'
            },
            contact: {
                name: 'Mr Sipho Motaung',
                role: 'Property Owner',
                phone: '+27 83 560 2234',
                note: 'Reachable by phone or WhatsApp at any time during the day. Viewings are conducted on Saturdays between 09:00 and 13:00, or by arrangement during the week. Please confirm availability before visiting.'
            }
        },
        {
            id: 'prop3',
            title: '3. Clarens Road Self-Contained Unit — Kestell',
            status: 'Fully Occupied',
            images: [
                'https://images.pexels.com/photos/276724/pexels-photo-276724.jpeg',
                'https://images.pexels.com/photos/1396122/pexels-photo-1396122.jpeg',
                'https://images.pexels.com/photos/2082087/pexels-photo-2082087.jpeg'
            ],
            location: {
                address: '22 Rondavel Close, Clarens Road, Kestell, Free State, 9860',
                description: 'Set on a quiet residential close just off the Clarens Road, this property offers a calm, semi-rural setting while remaining accessible to the college and town. Ideal for students who value privacy and independence.',
                campus: 'Maluti TVET College — Kestell Campus',
                distance: 'Approximately 2.8 km — about a 35-minute walk or a quick taxi ride. A bicycle is recommended for daily commuting.',
                mapSrc: 'https://www.google.com/maps?q=Clarens,+Free+State,+South+Africa&output=embed'
            },
            features: [
                'Fully self-contained unit with its own private entrance — no shared access with other tenants',
                'Private indoor toilet and shower en suite',
                'Prepaid electricity meter — tenant purchases and manages their own units',
                'Burglar bars on all windows and reinforced security door with deadbolt lock',
                'Dedicated off-street parking bay — suitable for a vehicle or secure bicycle storage',
                'Access to shared vegetable garden — tenants are welcome to use and maintain it',
                'Small pets considered upon prior discussion with the owner',
                'All windows fitted with fly screens'
            ],
            pricing: {
                monthly: 'R2 200 per month',
                deposit: 'R1 100 (50% of monthly rent — refundable)',
                includes: 'Municipal rates and refuse removal included in the monthly rent.',
                electricity: 'Water and electricity are metered separately and paid directly by the tenant.',
                paymentTerms: 'Rent is due on the 1st of every month. The deposit is payable alongside the signed lease agreement. It is held in full and returned at the end of the tenancy, provided no damage is identified during the exit inspection.'
            },
            contact: {
                name: 'Ms Lerato Mokoena',
                role: 'Property Owner',
                phone: '+27 61 874 9905',
                note: 'This unit is currently fully occupied. You are welcome to contact Ms Mokoena to be placed on the waiting list — she will reach out as soon as a vacancy arises. Enquiries via WhatsApp are preferred.'
            }
        }
    ];

    // Modal
    const swOverlay   = document.getElementById('sw-modal-overlay');
    const swMapIframe = document.getElementById('sw-map-iframe');
    const swModalName = document.getElementById('sw-modal-prop-name');
    const swModalAddr = document.getElementById('sw-modal-prop-address');

    function swOpenModal(prop) {
        swModalName.textContent = prop.title;
        swModalAddr.textContent = prop.location.address;
        swMapIframe.src = prop.location.mapSrc;
        swOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function swCloseModal() {
        swOverlay.classList.remove('open');
        swMapIframe.src = '';
        document.body.style.overflow = '';
    }

    document.getElementById('sw-modal-close').addEventListener('click', swCloseModal);
    swOverlay.addEventListener('click', e => { if (e.target === swOverlay) swCloseModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') swCloseModal(); });

    // Build each property
    function swBuildProperty(prop) {
        const section = document.createElement('div');
        section.className = 'sw-property-section';

        // Top bar
        const topbar = document.createElement('div');
        topbar.className = 'sw-property-topbar';

        const titleEl = document.createElement('h2');
        titleEl.className = 'sw-property-title';
        titleEl.textContent = prop.title;

        const badge = document.createElement('span');
        badge.className = 'sw-status-badge';
        badge.innerHTML = `${prop.status}`;

        topbar.appendChild(titleEl);
        topbar.appendChild(badge);
        section.appendChild(topbar);

        // Grid
        const grid = document.createElement('div');
        grid.className = 'sw-content-grid';

        // ---- LEFT ----
        const imgCol = document.createElement('div');
        imgCol.className = 'sw-image-column';

        const mainWrapper = document.createElement('div');
        mainWrapper.className = 'sw-main-image-wrapper';
        const mainImg = document.createElement('img');
        mainImg.className = 'sw-main-image';
        mainImg.src = prop.images[0];
        mainImg.alt = prop.title;
        mainWrapper.appendChild(mainImg);
        imgCol.appendChild(mainWrapper);

        const footer = document.createElement('div');
        footer.className = 'sw-image-footer-row';

        const mapBtn = document.createElement('button');
        mapBtn.className = 'sw-browse-btn';
        mapBtn.textContent = 'See on the map';
        mapBtn.addEventListener('click', () => swOpenModal(prop));
        footer.appendChild(mapBtn);

        const thumbsWrapper = document.createElement('div');
        thumbsWrapper.className = 'sw-thumbnails-wrapper';

        function setActiveImg(idx) {
            mainImg.style.opacity = '0';
            setTimeout(() => { mainImg.src = prop.images[idx]; mainImg.style.opacity = '1'; }, 200);
            thumbsWrapper.querySelectorAll('.sw-thumbnail').forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        prop.images.forEach((src, idx) => {
            const thumb = document.createElement('div');
            thumb.className = 'sw-thumbnail' + (idx === 0 ? ' active' : '');
            thumb.innerHTML = `<img src="${src}" alt="View ${idx + 1}">`;
            thumb.addEventListener('click', () => setActiveImg(idx));
            thumbsWrapper.appendChild(thumb);
        });

        footer.appendChild(thumbsWrapper);
        imgCol.appendChild(footer);
        grid.appendChild(imgCol);

        // ---- RIGHT: Accordion ----
        const accCol = document.createElement('div');
        accCol.className = 'sw-accordion-column';

        const accordionItems = [
            {
                label: 'Location',
                buildContent: () => {
                    const body = document.createElement('div');
                    body.className = 'sw-acc-body';

                    const addr = document.createElement('p');
                    addr.className = 'sw-loc-address';
                    addr.textContent = prop.location.address;
                    body.appendChild(addr);

                    const desc = document.createElement('p');
                    desc.className = 'sw-body-text';
                    desc.textContent = prop.location.description;
                    body.appendChild(desc);

                    const campusWrap = document.createElement('div');
                    campusWrap.className = 'sw-loc-campus-row';

                    const campusLabel = document.createElement('span');
                    campusLabel.className = 'sw-field-label';
                    campusLabel.textContent = 'Nearest campus';
                    campusWrap.appendChild(campusLabel);

                    const campusName = document.createElement('span');
                    campusName.className = 'sw-loc-campus-name';
                    campusName.textContent = prop.location.campus;
                    campusWrap.appendChild(campusName);

                    const campusDist = document.createElement('span');
                    campusDist.className = 'sw-loc-campus-dist';
                    campusDist.textContent = prop.location.distance;
                    campusWrap.appendChild(campusDist);

                    body.appendChild(campusWrap);
                    return body;
                }
            },
            {
                label: 'Features',
                buildContent: () => {
                    const body = document.createElement('div');
                    body.className = 'sw-acc-body';
                    const ul = document.createElement('ul');
                    ul.className = 'sw-features-list';
                    prop.features.forEach(f => {
                        const li = document.createElement('li');
                        li.textContent = f;
                        ul.appendChild(li);
                    });
                    body.appendChild(ul);
                    return body;
                }
            },
            {
                label: 'Pricing',
                buildContent: () => {
                    const body = document.createElement('div');
                    body.className = 'sw-acc-body';

                    const rows = document.createElement('div');
                    rows.className = 'sw-pricing-rows';

                    const items = [
                        { label: 'Monthly rent', value: prop.pricing.monthly },
                        { label: 'Deposit', value: prop.pricing.deposit },
                        { label: 'Included in rent', value: prop.pricing.includes },
                        { label: 'Electricity', value: prop.pricing.electricity }
                    ];

                    items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'sw-pricing-row';
                        row.innerHTML = `<span class="sw-pricing-row-label">${item.label}</span><span class="sw-pricing-row-value">${item.value}</span>`;
                        rows.appendChild(row);
                    });

                    body.appendChild(rows);

                    const termsLabel = document.createElement('span');
                    termsLabel.className = 'sw-field-label';
                    termsLabel.textContent = 'Payment & deposit terms';
                    body.appendChild(termsLabel);

                    const termsText = document.createElement('p');
                    termsText.className = 'sw-body-text';
                    termsText.textContent = prop.pricing.paymentTerms;
                    body.appendChild(termsText);

                    return body;
                }
            },
            {
                label: 'Contact',
                buildContent: () => {
                    const body = document.createElement('div');
                    body.className = 'sw-acc-body';

                    const name = document.createElement('div');
                    name.className = 'sw-contact-name';
                    name.textContent = prop.contact.name;
                    body.appendChild(name);

                    const role = document.createElement('div');
                    role.className = 'sw-contact-role';
                    role.textContent = prop.contact.role;
                    body.appendChild(role);

                    const phone = document.createElement('div');
                    phone.className = 'sw-contact-phone';
                    phone.textContent = prop.contact.phone;
                    body.appendChild(phone);

                    const note = document.createElement('div');
                    note.className = 'sw-contact-note';
                    note.textContent = prop.contact.note;
                    body.appendChild(note);

                    return body;
                }
            }
        ];

        accordionItems.forEach(item => {
            const accItem = document.createElement('div');
            accItem.className = 'sw-acc-item';

            const header = document.createElement('div');
            header.className = 'sw-acc-header';
            header.innerHTML = `<h3>${item.label}</h3><button class="sw-acc-toggle">+</button>`;

            const contentWrap = document.createElement('div');
            contentWrap.className = 'sw-acc-content';
            contentWrap.appendChild(item.buildContent());

            header.addEventListener('click', () => {
                const isOpen = accItem.classList.contains('active');
                accCol.querySelectorAll('.sw-acc-item').forEach(el => el.classList.remove('active'));
                if (!isOpen) accItem.classList.add('active');
            });

            accItem.appendChild(header);
            accItem.appendChild(contentWrap);
            accCol.appendChild(accItem);
        });

        grid.appendChild(accCol);
        section.appendChild(grid);
        return section;
    }

    const container = document.getElementById('sw-properties-container');
    swProperties.forEach(prop => container.appendChild(swBuildProperty(prop)));

</script>
</body>
