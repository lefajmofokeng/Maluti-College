<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avid Account</title>
    <style>
        @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Book.woff2') format('woff2'),
                 url('fonts/CircularStd-Book.woff2') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Medium.woff2') format('woff2'),
                 url('fonts/CircularStd-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Bold.woff2') format('woff2'),
                 url('fonts/CircularStd-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        }

        /* --- Avid Account Scoped Styles --- */
        .avid-account-container * {
            box-sizing: border-box;
            font-family: 'Circular Std', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .avid-account-container {
            display: flex;
            min-height: 100vh;
            color: #1A1A1A;
            background-color: #fff;
        }

        /* Image Side */
        .avid-account-image-panel {
            flex: 1;
            background-image: url('https://images.pexels.com/photos/12810660/pexels-photo-12810660.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            padding: 24px;
        }

        .avid-account-logo {
            position: absolute;
            top: 24px;
            left: 30px;
            width: 50px;
            height: auto;
        }

        /* Form Side */
        .avid-account-form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 60px;
        }

        .avid-account-form-panel .avid-form-wrapper {
            width: 100%;
            max-width: 440px;
        }

        /* Utility classes hidden for toggle */
        .avid-account-form-panel .hidden {
            display: none !important;
        }

        /* Headings & Text */
        .avid-account-form-panel h2 {
            font-weight: bold;
            font-size: 28px;
            color: #000;
            text-align: center;
            margin-bottom: 30px;
        }

        .avid-account-form-panel p {
            font-size: 14px;
            line-height: 20px;
            color: #666;
            text-align: center;
        }

        /* Tab Switcher */
        .avid-type-switcher {
            display: flex;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .avid-type-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: background-color 0.2s, color 0.2s;
        }

        .avid-type-btn.active {
            background-color: #F5F5F5;
            color: #000;
        }

        /* Form Fields */
        .avid-input-group {
            margin-bottom: 20px;
        }

        .avid-input-label {
            display: block;
            font-size: 13px;
            color: #1A1A1A;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .avid-required-star {
            color: #D61A3C; /* Avid red */
        }

        .avid-form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            color: #1A1A1A;
            transition: border-color 0.2s;
        }

        .avid-form-input::placeholder {
            color: #A0A0A0;
        }

        .avid-form-input:focus {
            outline: none;
            border-color: #A0A0A0;
        }

        /* Select field with caret */
        .avid-select-wrapper {
            position: relative;
        }

        .avid-form-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .avid-select-caret {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        /* Password field with eye */
        .avid-password-wrapper {
            position: relative;
        }

        .avid-password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* Buttons */
        .avid-btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #006bbd; /* Avid red */
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .avid-btn-primary:hover {
            background-color: #006bbdbd;
        }

        /* OAuth Buttons */
        .avid-oauth-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avid-btn-oauth {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #fff;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            color: #1A1A1A;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .avid-btn-oauth:hover {
            border-color: #A0A0A0;
        }

        .avid-oauth-icon {
            width: 18px;
            height: 18px;
        }

        /* Divider */
        .avid-divider-row {
            display: flex;
            align-items: center;
            text-align: center;
            color: #A0A0A0;
            font-size: 14px;
            margin: 20px 0;
        }

        .avid-divider-line {
            flex-grow: 1;
            height: 1px;
            background-color: #E0E0E0;
        }

        .avid-divider-text {
            padding: 0 10px;
        }

        /* Footer links */
        .avid-form-footer {
            margin-top: 20px;
            font-size: 13px;
        }

        .avid-form-link {
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }

        .avid-form-link:hover {
            color: #000;
        }

        /* Media Queries for Mobile Responsiveness */
        @media (max-width: 991px) {
            .avid-account-image-panel {
                display: none; /* Hide image panel on smaller devices */
            }
            .avid-account-form-panel {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .avid-account-form-panel h2 {
                font-size: 24px;
            }
            .avid-type-btn {
                font-size: 13px;
                padding: 10px;
            }
        }
    </style>
</head>
<div class="avid-account-container">

    <!-- Left Image Panel (Hidden on Mobile) -->
    <div class="avid-account-image-panel">
        <img src="images/logo.png" alt="Avid Logo" class="avid-account-logo">
        <!-- The background image of the people high-fiving is handled via CSS in a real application -->
    </div>

    <!-- Right Form Panel -->
    <div class="avid-account-form-panel">
        <div class="avid-form-wrapper">
            
            <!-- Mobile Logo (Shown only on small screens) -->
            <img src="https://example.com/avid-logo-red.svg" alt="Avid Logo" class="avid-account-logo avid-mobile-logo hidden">

            <!-- "Create an account" View -->
            <div id="avidSignupView">
                <h2>Create an account</h2>

                <!-- User Type Switcher (Faculty vs Intern) -->
                <div class="avid-type-switcher">
                    <button class="avid-type-btn active" onclick="switchType('faculty', this)">Staff & Faculty</button>
                    <button class="avid-type-btn" onclick="switchType('intern', this)">Intern</button>
                </div>

                <form id="avidSignupForm">
                    <!-- Faculty Specific Field -->
                    <div class="avid-input-group" id="avidFacultyField">
                        <label class="avid-input-label">Institution / Organization Name <span class="avid-required-star">*</span></label>
                        <div class="avid-select-wrapper">
                            <select class="avid-form-input avid-form-select" required>
                                <option value="" disabled selected>Type to Search or Select</option>
                                <option value="inst1">Institution One</option>
                                <option value="inst2">Institution Two</option>
                            </select>
                            <svg class="avid-select-caret" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>

                    <!-- OAuth Buttons -->
                    <div class="avid-oauth-row">
                        <button type="button" class="avid-btn-oauth">
                            <img src="https://example.com/google-icon.svg" alt="Google" class="avid-oauth-icon">
                            Sign up with Google
                        </button>
                        <button type="button" class="avid-btn-oauth">
                            <img src="https://example.com/microsoft-icon.svg" alt="Microsoft" class="avid-oauth-icon">
                            Sign up with Microsoft
                        </button>
                    </div>

                    <div class="avid-divider-row">
                        <span class="avid-divider-line"></span>
                        <span class="avid-divider-text">or</span>
                        <span class="avid-divider-line"></span>
                    </div>

                    <!-- Common Fields -->
                    <div class="avid-input-row" style="display: flex; gap: 15px;">
                        <div class="avid-input-group" style="flex: 1;">
                            <label class="avid-input-label">First Name</label>
                            <input type="text" class="avid-form-input" placeholder="John" required>
                        </div>
                        <div class="avid-input-group" style="flex: 1;">
                            <label class="avid-input-label">Last Name</label>
                            <input type="text" class="avid-form-input" placeholder="Smith" required>
                        </div>
                    </div>

                    <div class="avid-input-group">
                        <label class="avid-input-label">Email</label>
                        <input type="email" class="avid-form-input" placeholder="olivia@avid.com" required>
                    </div>

                    <div class="avid-input-group">
                        <label class="avid-input-label">Password</label>
                        <div class="avid-password-wrapper">
                            <input type="password" class="avid-form-input" id="avidSignupPassword" required>
                            <button type="button" class="avid-password-toggle" onclick="togglePassword('avidSignupPassword')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="avid-btn-primary">Create an account</button>
                </form>

                <div class="avid-form-footer">
                    <p>By signing up, I agree to Avid's <a href="#" class="avid-form-link">Privacy policy</a> and <a href="#" class="avid-form-link">Terms of service</a></p>
                    <p style="margin-top: 15px;">Already have one? <span class="avid-form-link" onclick="toggleView()">Log in</span></p>
                </div>
            </div>

            <!-- "Log in" View -->
            <div id="avidLoginView" class="hidden">
                <h2>Log in</h2>

                <!-- OAuth Buttons -->
                <div class="avid-oauth-row">
                    <button type="button" class="avid-btn-oauth">
                        <img src="https://example.com/google-icon.svg" alt="Google" class="avid-oauth-icon">
                        Log in with Google
                    </button>
                    <button type="button" class="avid-btn-oauth">
                        <img src="https://example.com/microsoft-icon.svg" alt="Microsoft" class="avid-oauth-icon">
                        Log in with Microsoft
                    </button>
                </div>

                <div class="avid-divider-row">
                    <span class="avid-divider-line"></span>
                    <span class="avid-divider-text">or</span>
                    <span class="avid-divider-line"></span>
                </div>

                <form id="avidLoginForm">
                    <div class="avid-input-group">
                        <label class="avid-input-label">Email</label>
                        <input type="email" class="avid-form-input" placeholder="olivia@avid.com" required>
                    </div>

                    <div class="avid-input-group">
                        <label class="avid-input-label">Password</label>
                        <div class="avid-password-wrapper">
                            <input type="password" class="avid-form-input" id="avidLoginPassword" required>
                            <button type="button" class="avid-password-toggle" onclick="togglePassword('avidLoginPassword')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <a href="staff-login.html" type="submit" class="avid-btn-primary">Log in</a>
                </form>

                <div class="avid-form-footer">
                    <p>Don't have an account? <span class="avid-form-link" onclick="toggleView()">Create an account</span></p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Scoped variable to track current user type
    let currentUserType = 'faculty';

    // Function to handle switching between Staff and Intern
    function switchType(type, buttonElement) {
        currentUserType = type;
        
        // Update button states
        const buttons = document.querySelectorAll('.avid-type-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');

        // Show/hide specific fields
        const facultyField = document.getElementById('avidFacultyField');
        if (type === 'faculty') {
            facultyField.classList.remove('hidden');
        } else {
            facultyField.classList.add('hidden');
        }
    }

    // Function to toggle password visibility
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }

    // Function to toggle between Signup and Login views
    function toggleView() {
        const signupView = document.getElementById('avidSignupView');
        const loginView = document.getElementById('avidLoginView');
        
        if (signupView.classList.contains('hidden')) {
            signupView.classList.remove('hidden');
            loginView.classList.add('hidden');
        } else {
            signupView.classList.add('hidden');
            loginView.classList.remove('hidden');
        }
    }
</script>
</html>
