<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squarespace • Log In</title>
    <!-- Squarespace uses fonts similar to Roboto and Clarkson, 
         we will use a clean sans-serif stack for this approximation. -->
    <style>
         @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Book.woff2') format('woff2'),
                 url('fonts/CircularStd-Book.woff2') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Medium.woff2') format('woff2'),
                 url('fonts/CircularStd-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'Circular Std';
            src: url('fonts/CircularStd-Bold.woff2') format('woff2'),
                 url('fonts/CircularStd-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        }
        /* --- Root and Reset --- */
        :root {
            --sqsp-text-main: #000000;
            --sqsp-text-sub: #757575;
            --sqsp-border-color: #E0E0E0;
            --sqsp-button-text: #272727;
            --sqsp-font-family: 'Circular Std',-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sqsp-font-family);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #FFFFFF;
            color: var(--sqsp-text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Global Elements --- */
        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.8;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            height: 24px;
            width: auto;
        }

        .create-account-link {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        /* --- Main Login Container --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-top: 100px; /* To avoid header overlap */
        }

        .login-heading {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 50px;
            letter-spacing: -0.01em;
        }

        .login-grid {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            width: 100%;
            max-width: 680px;
            align-items: center;
            margin-bottom: 40px;
        }

        /* --- Vertical Divider (The 'OR') --- */
        .divider {
            height: 100%;
            background-color: var(--sqsp-border-color);
            position: relative;
        }

        .or-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #FFFFFF;
            color: #C0C0C0;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 0;
        }

        /* --- Standard Form Section (Left Side) --- */
        .form-section {
            padding-right: 50px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            color: var(--sqsp-text-sub);
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--sqsp-border-color);
            padding-bottom: 8px;
        }

        .sqsp-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
            color: var(--sqsp-text-main);
            font-family: inherit;
        }

        .sqsp-input::placeholder {
            color: var(--sqsp-text-sub);
            opacity: 0.6;
        }

        .password-toggle {
            cursor: pointer;
            margin-left: 10px;
            display: flex;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: #9E9E9E;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            background-color: #0065b4; /* Grey/disabled color in screenshot */
            border: none;
            border-radius: 6px;
            color: #ffffff; /* White/disabled color in screenshot */
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px; font-family: inherit;
        }

        /* If input were valid, the button would look like this:
        .login-btn-active {
            background-color: #000000;
            color: #FFFFFF;
            cursor: pointer;
        }
        */

        /* --- Social Buttons Section (Right Side) --- */
        .social-section {
            padding-left: 50px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .social-btn {
            width: 100%;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid var(--sqsp-border-color);
            padding: 0 20px;
            cursor: pointer; border-radius: 6px; font-family: inherit;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .social-btn:hover {
            border-color: #C0C0C0;
            background-color: #FAFAFA;
        }

        .social-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .social-icon-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 20px;
        }

        .social-btn-text {
            font-size: 15px;
            font-weight: 400;
            color: var(--sqsp-button-text);
            text-align: center;
        }

        /* Adjustments for icons to ensure consistent sizing */
        .social-icon-wrapper svg,
        .social-icon-wrapper img {
            max-height: 18px;
            max-width: 18px;
        }

        /* --- Main Page Footer (Can't Log In) --- */
        .footer-links-container {
            text-align: center;
            margin-top: 20px;
        }

        .cant-log-in {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            margin-bottom: 24px;
            display: block;
        }

        .recaptcha-notice {
            color: var(--sqsp-text-sub);
            font-size: 13px;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        .recaptcha-link {
            text-decoration: underline; color: #0065b4; font-weight: 500;
        }

        /* --- Mobile Responsive (Breakpoints) --- */
        @media screen and (max-width: 720px) {
            .login-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                max-width: 400px;
            }

            .form-section {
                padding-right: 0;
                margin-bottom: 50px;
            }

            .divider {
                height: 1px;
                width: 100%;
                margin-bottom: 50px;
            }

            .or-label {
                padding: 0 10px;
            }

            .social-section {
                padding-left: 0;
            }
        }

        @media screen and (max-width: 480px) {
            header {
                padding: 20px;
            }
            main {
                padding-top: 80px;
            }
            .login-heading {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo-container">
            <!-- Squarespace Logo SVG Approximation -->
            <svg class="logo-icon" viewBox="0 0 45.4 45.4" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
                <path d="M45.4,22.7A22.7,22.7,0,1,1,22.7,0,22.7,22.7,0,0,1,45.4,22.7Z"/>
                <path fill="#fff" d="M12.9,33.1H9.8V12.3h14c3,0,5.4,2.2,5.4,5s-2.4,5-5.4,5H12.9v10.8Zm0-15.6v10.8h11.2c1.7,0,3.1-1.2,3.1-2.9s-1.4-2.9-3.1-2.9H12.9Zm16.8,15.6H26.6V12.3h14c3,0,5.4,2.2,5.4,5s-2.4,5-5.4,5H29.7v10.8Zm0-15.6v10.8h11.2c1.7,0,3.1-1.2,3.1-2.9s-1.4-2.9-3.1-2.9H29.7Z" transform="translate(-4 -4.8)"/>
            </svg>
        </div>
        <a href="#" class="create-account-link">Create Account</a>
    </header>

    <!-- Main Content Section -->
    <main>
        <h1 class="login-heading">Log into Maluti Workspace</h1>

        <div class="login-grid">
            <!-- Left Side: Form -->
            <div class="form-section">
                <form>
                    <div class="input-group">
                        <label class="input-label" for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="sqsp-input" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="sqsp-input" placeholder="Password" required>
                            <!-- Password Eye Icon Approximation -->
                            <div class="password-toggle">
                                <svg viewBox="0 0 24 24" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Log In</button>
                </form>
            </div>

            <!-- Divider with OR Label -->
            <div class="divider">
                <span class="or-label">OR</span>
            </div>

            <!-- Right Side: Social Buttons (Google replaced with Microsoft) -->
            <div class="social-section">
                
                <!-- MOVED & MODIFIED: Microsoft Button replacing Google -->
                <button class="social-btn">
                    <div class="social-content">
                        <div class="social-icon-wrapper">
                            <!-- Official Microsoft Logo Icon -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width="16" height="16" viewBox="0 0 21 21">
                                <title>Microsoft Logo</title>
                                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                                <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                                <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                            </svg>
                        </div>
                        <span class="social-btn-text">Continue with Microsoft</span>
                    </div>
                </button>

                <!-- Apple Button (Retained) -->
                <button class="social-btn">
                    <div class="social-content">
                        <div class="social-icon-wrapper">
                            <!-- Simple Apple Icon -->
                            <svg version="1.1" id="apple-logo" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" xmlns:xlink="[http://www.w3.org/1999/xlink](http://www.w3.org/1999/xlink)" x="0px" y="0px"
                                viewBox="0 0 170 170" enable-background="new 0 0 170 170" xml:space="preserve" fill="#000000">
                                <g>
                                    <path d="M150.37,130.25c-2.45,3.66-5.31,7.19-8.55,10.51c-3.58,3.66-7.4,7.01-11.46,10.01c-9.92,7.28-21.67,12.82-35.25,16.61c-6.1,1.71-12.82,2.56-20.19,2.56c-11.83,0-23.74-2.31-35.73-6.93c-11.99-4.62-21.05-8.15-27.18-10.59
                                        c-6.84-2.73-12.82-5.71-17.95-8.91c-2.11-1.32-4.14-2.61-6.1-3.86l0.31-0.62c-2.43-1.61-4.71-3.11-6.84-4.5
                                        c-31.1-23.32-44.15-56.12-39.11-98.39c2.31-19.34,10.43-35.43,24.36-48.27C41.1,15.3,55.08,8.88,68.99,8.88
                                        c6.1,0,11.93,1.21,17.51,3.63c5.58,2.41,9.8,3.95,12.66,4.61c5.22,1.2,11.13,1.8,17.72,1.8c7.32,0,13.62-0.6,18.9-1.8
                                        c2.86-0.66,7.12-2.22,12.78-4.66c5.67-2.44,11.23-3.66,16.69-3.66c12.2,0,23.11,3.42,32.74,10.25c9.62,6.83,16.89,15.34,21.82,25.55
                                        c-16.71,9.15-25.07,23.36-25.07,42.61c0,16.14,6.72,29.13,20.17,38.97c3.54,2.57,8.04,5.2,13.49,7.9l1.3,0.64
                                        C152.01,127.35,151.2,128.9,150.37,130.25z M119.11,7.24C119.11,25.6,105.1,39.69,89.05,39.69c-0.26,0-0.53,0-0.79-0.01
                                        C87.6,21.2,101.49,6.51,118.42,6.51C118.66,6.51,118.89,6.51,119.11,7.24z"/>
                                </g>
                            </svg>
                        </div>
                        <span class="social-btn-text">Continue with Apple</span>
                    </div>
                </button>

                <!-- Facebook Button (Retained) -->
                <button class="social-btn">
                    <div class="social-content">
                        <div class="social-icon-wrapper">
                            <!-- Official Facebook Icon -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 512 512">
                                <path d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z" fill="#1877f2"/>
                            </svg>
                        </div>
                        <span class="social-btn-text">Continue with Facebook</span>
                    </div>
                </button>

            </div>
        </div>

        <!-- Footer Links Container -->
        <div class="footer-links-container">
            <a href="#" class="cant-log-in">Can't Log In?</a>
            
            <p class="recaptcha-notice">
                Secure Login with reCAPTCHA subject to Google<br>
                <a href="#" class="recaptcha-link">Terms</a> & <a href="#" class="recaptcha-link">Privacy</a>
            </p>
        </div>
    </main>

</body>
</html>
